<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>STH HR Challenge | Общий рейтинг</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }

        .header { background: #0B1A2C; padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; border-bottom: 3px solid #F26B2E; }
        .logo-area { display: flex; align-items: center; gap: 12px; }
        .logo-icon { background: #F26B2E; width: 48px; height: 48px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 24px; color: #0B1A2C; box-shadow: 0 4px 12px rgba(242,107,46,0.3); }
        .logo-text h2 { color: white; font-size: 1.6rem; font-weight: 700; }
        .logo-text p { color: #9AAEBF; font-size: 0.75rem; }
        .user-info { background: #1E2F42; padding: 6px 20px; border-radius: 60px; display: flex; gap: 14px; align-items: center; color: white; font-weight: 500; }
        .logout-btn { background: none; border: 1px solid rgba(242,107,46,0.6); color: #F26B2E; padding: 5px 16px; border-radius: 40px; cursor: pointer; font-size: 0.8rem; transition: 0.2s; }
        .logout-btn:hover { background: #F26B2E; color: #0B1A2C; border-color: #F26B2E; }
        .main-content { padding: 32px; }
        .login-card { background: #F9FBFD; border-radius: 32px; padding: 32px; max-width: 520px; margin: 0 auto; text-align: center; border: 1px solid #E2EDF2; }
        .login-card input { width: 100%; padding: 16px 20px; font-size: 1rem; border: 2px solid #CFDFE8; border-radius: 60px; margin: 20px 0; }
        .login-card input:focus { border-color: #F26B2E; outline: none; }
        .btn-primary { background: #F26B2E; color: white; border: none; padding: 14px 28px; border-radius: 60px; font-weight: bold; font-size: 1rem; cursor: pointer; width: 100%; transition: 0.2s; }
        .btn-primary:hover { background: #D85A1F; transform: translateY(-2px); }
        .question-header { background: #F1F6FA; padding: 12px 24px; border-radius: 60px; display: flex; justify-content: space-between; margin-bottom: 24px; font-weight: 600; }
        .question-text { background: #FFFFFF; padding: 28px; border-radius: 28px; font-size: 1.35rem; font-weight: 600; border-left: 6px solid #F26B2E; margin-bottom: 28px; }
        .options-list { display: flex; flex-direction: column; gap: 14px; margin-bottom: 30px; }
        .option-btn { background: white; border: 2px solid #E2EDF2; border-radius: 60px; padding: 14px 20px; text-align: left; font-size: 0.98rem; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 12px; }
        .option-btn:hover:not(:disabled) { background: #FFF3EC; border-color: #F26B2E; transform: translateX(5px); }
        .option-prefix { background: #EFF3F8; width: 34px; height: 34px; display: inline-flex; align-items: center; justify-content: center; border-radius: 30px; font-weight: bold; color: #F26B2E; }
        .feedback-area { background: #FFF7F0; border-radius: 24px; padding: 22px; margin: 20px 0; border-left: 6px solid #F26B2E; }
        .next-btn:disabled { background: #BCCCD8; cursor: not-allowed; }
        .score-summary { background: linear-gradient(135deg, #0B1A2C, #1F3A4C); color: white; border-radius: 28px; padding: 32px; text-align: center; margin-bottom: 32px; }
        .big-score { font-size: 3.5rem; font-weight: 800; color: #F26B2E; }
        .rating-table { width: 100%; border-collapse: collapse; background: white; border-radius: 24px; overflow: hidden; }
        .rating-table th, .rating-table td { padding: 14px 12px; text-align: left; border-bottom: 1px solid #E6F0F5; }
        .rating-table th { background: #F1F6FA; color: #0B1A2C; }
        .restart-btn { background: #0B1A2C; margin-top: 16px; width: auto; display: inline-block; padding: 12px 28px; }
        .flex-buttons { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; margin-top: 24px; }
        footer { font-size: 0.7rem; text-align: center; padding: 20px; background: #F9FBFD; color: #5B738C; border-top: 1px solid #E2EDF2; }
        @media (max-width: 700px) { .main-content { padding: 20px; } .question-text { font-size: 1.1rem; } }
    </style>
</head>
<body>
<div class="app-container" id="appRoot">
    <div class="header">
        <div class="logo-area"><div class="logo-icon">STH</div><div class="logo-text"><h2>STH HR Challenge</h2><p>Общий рейтинг всех рекрутеров</p></div></div>
        <div class="user-info" id="userInfoBar" style="display: none;"><span id="userNameDisplay"></span><button class="logout-btn" id="logoutBtn">Выйти</button></div>
    </div>
    <div class="main-content" id="mainContent"></div>
    <footer>🏆 Рейтинг сохраняется в Google Таблице и виден всем игрокам.</footer>
</div>

<script>
    // ========== НАСТРОЙКИ ДЛЯ GOOGLE SHEETS (ЗАМЕНИТЕ НА СВОИ) ==========
    const SHEET_ID = "1AIGQFAF4S8EJyfbv7UysM-CWpXMCxhiIM5bkAwL0OS0";          // ID вашей Google Таблицы
    const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbxX_QskLnQdr22KcYgaPYUQdSz4nPDahpszZf8Ho4uWbhKKvJnorWO2MsH8nCPRFX7aqQ/exec"; // URL веб-приложения Apps Script
    // ===================================================================

    // Глобальные переменные
    let masterQuestions = [];        // Вопросы по темам: [{theme, text, options: []}, ...]
    let themeList = [];              // Список тем
    let currentUser = null;
    let currentGame = null;
    let leaderboard = [];            // Кеш рейтинга из таблицы

    // ------------------------------------------------------------------
    // РАБОТА С ВОПРОСАМИ ИЗ GOOGLE SHEETS
    async function loadQuestionsFromSheet() {
        try {
            const response = await fetch(`${WEBAPP_URL}?action=getQuestions`);
            const data = await response.json();
            if (data.status === "ok" && Array.isArray(data.data)) {
                // Группируем вопросы по темам
                const grouped = {};
                data.themes.forEach(theme => {
                    grouped[theme] = [];
                });
                data.data.forEach(q => {
                    if (!grouped[q.theme]) {
                        grouped[q.theme] = [];
                    }
                    grouped[q.theme].push({
                        text: q.text,
                        options: q.options
                    });
                });
                masterQuestions = grouped;
                themeList = data.themes;
                return true;
            }
        } catch(e) { console.warn("Не удалось загрузить вопросы из Sheets", e); }
        return false;
    }

    // ------------------------------------------------------------------
    // РАБОТА С ОБЩИМ РЕЙТИНГОМ ЧЕРЕЗ GOOGLE SHEETS
    async function loadGlobalLeaderboard() {
        try {
            const response = await fetch(`${WEBAPP_URL}?action=get`);
            const data = await response.json();
            if (data.status === "ok" && Array.isArray(data.data)) {
                leaderboard = data.data.map(row => ({
                    name: row.name,
                    totalPointsSum: row.totalPoints || 0,
                    gamesCount: row.gamesCount || 0,
                    bestScore: row.bestScore || 0
                }));
                leaderboard.sort((a,b) => b.totalPointsSum - a.totalPointsSum);
                return true;
            }
        } catch(e) { console.warn("Не удалось загрузить рейтинг", e); }
        return false;
    }

    async function saveScoreToGlobal(name, score) {
        try {
            await fetch(WEBAPP_URL, {
                method: "POST",
                mode: "cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ action: "updateScore", name: name, score: score })
            });
        } catch(e) { console.warn("Ошибка сохранения рейтинга", e); }
    }

    async function updateGlobalStats(userName, gameScore) {
        await saveScoreToGlobal(userName, gameScore);
        // Перезагружаем рейтинг чтобы получить свежие данные
        await loadGlobalLeaderboard();
    }

    // ------------------------------------------------------------------
    // ДОБАВЛЕНИЕ НОВОГО ВОПРОСА (через админ-панель)
    async function addNewQuestion(theme, questionText, options, correctIndex, feedback) {
        try {
            const response = await fetch(WEBAPP_URL, {
                method: "POST",
                mode: "cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    action: "addQuestion",
                    theme: theme,
                    question: questionText,
                    options: options,
                    correctIndex: correctIndex,
                    feedback: feedback
                })
            });
            const data = await response.json();
            return data.status === "ok";
        } catch(e) {
            console.warn("Ошибка добавления вопроса", e);
            return false;
        }
    }

    // ------------------------------------------------------------------
    // FALLBACK ВОПРОСЫ (1000 вопросов: по 200 на каждую тему)
    // Генерируются если Google Sheets недоступен или пуст
    function generateFallbackQuestions() {
        const themes = ["💰 Зарплата", "⏰ График", "🏭 Условия", "📈 Карьера", "🚚 Транспорт"];
        const grouped = {};
        themes.forEach(t => grouped[t] = []);
        
        // База шаблонов вопросов для каждой темы
        const questionTemplates = {
            "💰 Зарплата": [
                { q: "Как часто выплачивается зарплата на складе STH?", a: ["Ежемесячно 5-го и 20-го числа", "Раз в месяц", "Каждую неделю", "По требованию сотрудника"], correct: 0, feedback: "Зарплата выплачивается дважды в месяц: 5-го и 20-го числа." },
                { q: "Что влияет на размер премии складского работника?", a: ["Выполнение плана и отсутствие брака", "Только стаж работы", "Личные отношения с руководителем", "Премии не предусмотрены"], correct: 0, feedback: "Премия зависит от выполнения плана и качества работы." },
                { q: "Какая минимальная ставка у комплектовщика в STH?", a: ["Зависит от разряда и зоны", "Фиксированная для всех", "Только процент от выработки", "Ставки нет, только сдельная оплата"], correct: 0, feedback: "Ставка зависит от разряда работника и зоны склада." },
                { q: "Когда происходит индексация зарплаты?", a: ["По решению компании, обычно раз в год", "Никогда", "Каждый квартал", "Только по заявлению сотрудника"], correct: 0, feedback: "Индексация проводится по решению руководства, обычно ежегодно." },
                { q: "Можно ли получить аванс вне графика выплат?", a: ["В исключительных случаях по заявлению", "Да, в любой день", "Нет, никогда", "Только директору"], correct: 0, feedback: "Аванс возможен в исключительных случаях по письменному заявлению." },
                { q: "Какие штрафы могут быть удержаны из зарплаты?", a: ["Только по исполнительным листам", "Любые по усмотрению руководителя", "За опоздания автоматически", "Штрафов не бывает"], correct: 0, feedback: "Удержания возможны только по законным основаниям (исполнительные листы)." },
                { q: "Как оформляется переработка?", a: ["Оплачивается дополнительно или компенсируется отгулом", "Не оплачивается", "Только отгулом", "Переработок не бывает"], correct: 0, feedback: "Переработка оплачивается или компенсируется дополнительным выходным." },
                { q: "Что такое 'северная надбавка' в STH?", a: ["Доплата за работу в северных регионах", "Бонус за стаж", "Премия за перевыполнение", "Компенсация питания"], correct: 0, feedback: "Надбавка за работу в районах Крайнего Севера и приравненных местностях." },
                { q: "Валюта выплаты зарплаты сотрудникам в РФ?", a: ["Только рубли", "Доллары или евро", "По выбору сотрудника", "Криптовалюта"], correct: 0, feedback: "Зарплата в России выплачивается исключительно в рублях." },
                { q: "Можно ли изменить систему оплаты труда?", a: ["По соглашению сторон и доп. соглашению к договору", "Нет, система неизменна", "Только при увольнении", "По желанию сотрудника без оформления"], correct: 0, feedback: "Изменение возможно по соглашению сторон с оформлением доп. соглашения." },
                { q: "Как рассчитывается отпускной?", a: ["По среднему заработку за 12 месяцев", "По окладу", "Минимальная сумма", "Не выплачиваются"], correct: 0, feedback: "Отпускные рассчитываются исходя из среднего заработка за последний год." },
                { q: "Что входит в расчётный листок?", a: ["Оклад, премии, удержания, итог", "Только итоговая сумма", "Только оклад", "Расчётных листков нет"], correct: 0, feedback: "В расчётном листке указываются все начисления и удержания." },

                { q: "Выходные дни при сменном графике:", a: ["По графику сменности", "Суббота и воскресенье", "Плавающие", "Выходных нет"], correct: 0, feedback: "Выходные определяются графиком сменности." },

                { q: "Работа в выходной день оплачивается:", a: ["В двойном размере", "Как обычный день", "В полуторном", "Не оплачивается"], correct: 0, feedback: "Работа в выходной оплачивается не менее чем в двойном размере." },
                { q: "Сокращённый рабочий день положен:", a: ["Несовершеннолетним и вредникам", "Всем", "Только женщинам", "Только мужчинам"], correct: 0, feedback: "Сокращённое время для несовершеннолетних и работников вредных производств." },
                { q: "Табель учёта рабочего времени ведётся:", a: ["Ежедневно", "Раз в неделю", "Раз в месяц", "Не ведётся"], correct: 0, feedback: "Табель заполняется ежедневно." }

            ]
        };

        // Генерируем 200 вопросов на каждую тему, комбинируя шаблоны и вариации
        for (let t = 0; t < themes.length; t++) {
            const theme = themes[t];
            const templates = questionTemplates[theme];
            
            // Добавляем базовые 20 вопросов из шаблонов
            for (let i = 0; i < templates.length; i++) {
                const tmpl = templates[i];
                const options = [
                    { text: tmpl.a[0], type: tmpl.correct === 0 ? 3 : 0, feedback: tmpl.correct === 0 ? tmpl.feedback : "Неверно" },
                    { text: tmpl.a[1], type: tmpl.correct === 1 ? 3 : 0, feedback: tmpl.correct === 1 ? tmpl.feedback : "Неверно" },
                    { text: tmpl.a[2], type: tmpl.correct === 2 ? 2 : 0, feedback: tmpl.correct === 2 ? tmpl.feedback : "Неверно" },
                    { text: tmpl.a[3], type: tmpl.correct === 3 ? 3 : 0, feedback: tmpl.correct === 3 ? tmpl.feedback : "Неверно" }
                ];
                // Перемешиваем варианты ответов
                for (let k = options.length - 1; k > 0; k--) {
                    const r = Math.floor(Math.random() * (k + 1));
                    [options[k], options[r]] = [options[r], options[k]];
                }
                grouped[theme].push({ text: tmpl.q, options });
            }
            
            // Генерируем ещё 180 вопросов через комбинации и вариации
            const prefixes = ["Как правильно", "Что верно", "Укажите верное", "Выберите правильное", "Какой вариант", "Что из перечисленного", "В каком случае", "Когда именно", "Где применяется", "Кто отвечает за"];
            const suffixes = ["в компании STH?", "на складе?", "согласно ТК РФ?", "в соответствии с правилами?", "по стандартам?", "в нашей практике?", "при выполнении работы?", "в типовой ситуации?", "по должностной инструкции?", "согласно регламенту?"];
            
            for (let v = 0; v < 180; v++) {
                const baseIdx = v % templates.length;
                const tmpl = templates[baseIdx];
                const prefix = prefixes[v % prefixes.length];
                const suffix = suffixes[Math.floor(v / 20) % suffixes.length];
                
                const variedQuestion = `${prefix} ${tmpl.q.toLowerCase().replace('?', '')} ${suffix}`;
                
                const options = [
                    { text: tmpl.a[0], type: tmpl.correct === 0 ? 3 : 0, feedback: tmpl.correct === 0 ? tmpl.feedback : "Неверно" },
                    { text: tmpl.a[1], type: tmpl.correct === 1 ? 3 : 0, feedback: tmpl.correct === 1 ? tmpl.feedback : "Неверно" },
                    { text: tmpl.a[2], type: tmpl.correct === 2 ? 2 : 0, feedback: tmpl.correct === 2 ? tmpl.feedback : "Неверно" },
                    { text: tmpl.a[3], type: tmpl.correct === 3 ? 3 : 0, feedback: tmpl.correct === 3 ? tmpl.feedback : "Неверно" }
                ];
                // Перемешиваем
                for (let k = options.length - 1; k > 0; k--) {
                    const r = Math.floor(Math.random() * (k + 1));
                    [options[k], options[r]] = [options[r], options[k]];
                }
                grouped[theme].push({ text: variedQuestion, options });
            }
        }
        
        return { grouped, themes };
    }

    async function initQuestions() {
        // Сначала генерируем fallback вопросы (1000 шт)
        const fallback = generateFallbackQuestions();
        masterQuestions = fallback.grouped;
        themeList = fallback.themes;
        
        // Пытаемся загрузить вопросы из Google Sheets
        const loaded = await loadQuestionsFromSheet();
        
        // Если вопросы загружены успешно и есть данные - они ЗАМЕНЯЮТ сгенерированные
        if (loaded && themeList.length > 0 && Object.keys(masterQuestions).length > 0) {
            console.log("Вопросы загружены из Google Sheets и заменили сгенерированные");
        } else {
            console.log("Используем сгенерированные вопросы (1000 шт)");
            // Восстанавливаем fallback если загрузка не удалась
            masterQuestions = fallback.grouped;
            themeList = fallback.themes;
        }
    }

    // ------------------------------------------------------------------
    // ЛОГИКА ИГРЫ
    function pickRandomQuestions() {
        const selected = [];
        themeList.forEach(theme => {
            const themeQuestions = masterQuestions[theme];
            if (!themeQuestions || themeQuestions.length === 0) return;
            const randIdx = Math.floor(Math.random() * themeQuestions.length);
            selected.push({
                theme: theme,
                questionObj: themeQuestions[randIdx],
                answered: false,
                points: null
            });
        });
        return selected;
    }

    function startNewGame(user) {
        const questionsPack = pickRandomQuestions();
        if (questionsPack.length === 0) {
            alert("Нет вопросов для викторины");
            return;
        }
        currentGame = {
            questions: questionsPack,
            currentIndex: 0,
            totalScore: 0,
            completed: false
        };
        renderGame();
    }

    // ------------------------------------------------------------------
    // ОТРИСОВКА ИНТЕРФЕЙСА
    function escapeHtml(str) {
        return String(str).replace(/[&<>"]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            if (m === '"') return '&quot;';
            return m;
        });
    }

            startNewGame(currentUser);
        });

        document.getElementById("adminPanelBtn").addEventListener("click", () => {
            renderAdminPanel();
        });
        
        renderRatingTable();
    }

    async function renderRatingTable() {
        const tbody = document.getElementById("ratingTableBody");
        if (!tbody) return;
        await loadGlobalLeaderboard();
        tbody.innerHTML = leaderboard.slice(0, 20).map(entry => {
            const avg = entry.gamesCount > 0 ? (entry.totalPointsSum / entry.gamesCount).toFixed(2) : "0";
            return `<tr>
                        <td>${escapeHtml(entry.name)}</td>
                        <td><strong>${entry.totalPointsSum.toFixed(1)}</strong></td>
                        <td>${entry.gamesCount}</td>
                        <td>${entry.bestScore.toFixed(1)}</td>
                    </tr>`;
        }).join('');
    }

    function renderAdminPanel() {
        const container = document.getElementById("mainContent");
        container.innerHTML = `
            <div class="login-card" style="max-width:700px;text-align:left;">
                <h2>⚙️ Добавить новый вопрос</h2>
                <p style="margin-bottom:20px;color:#5B738C;">Вопрос будет добавлен в Google Таблицу и станет доступен всем игрокам.</p>
                
                <label style="display:block;margin-bottom:8px;font-weight:600;">Тема:</label>
                <select id="adminTheme" style="width:100%;padding:12px;border:2px solid #CFDFE8;border-radius:60px;margin-bottom:16px;">
                    ${themeList.map(t => `<option value="${escapeHtml(t)}">${escapeHtml(t)}</option>`).join('')}
                </select>
                
                <label style="display:block;margin-bottom:8px;font-weight:600;">Текст вопроса:</label>
                <textarea id="adminQuestion" rows="3" style="width:100%;padding:12px;border:2px solid #CFDFE8;border-radius:16px;margin-bottom:16px;resize:vertical;"></textarea>
                
                <label style="display:block;margin-bottom:8px;font-weight:600;">Варианты ответов:</label>
                <input type="text" id="opt0" placeholder="Вариант 1" style="width:100%;padding:12px;border:2px solid #CFDFE8;border-radius:60px;margin-bottom:10px;">
                <input type="text" id="opt1" placeholder="Вариант 2" style="width:100%;padding:12px;border:2px solid #CFDFE8;border-radius:60px;margin-bottom:10px;">
                <input type="text" id="opt2" placeholder="Вариант 3" style="width:100%;padding:12px;border:2px solid #CFDFE8;border-radius:60px;margin-bottom:10px;">
                <input type="text" id="opt3" placeholder="Вариант 4" style="width:100%;padding:12px;border:2px solid #CFDFE8;border-radius:60px;margin-bottom:16px;">
                
                <label style="display:block;margin-bottom:8px;font-weight:600;">Номер правильного ответа (0-3):</label>
                <input type="number" id="correctIdx" min="0" max="3" value="0" style="width:100%;padding:12px;border:2px solid #CFDFE8;border-radius:60px;margin-bottom:16px;">
                
                <button class="btn-primary" id="saveQuestionBtn">💾 Сохранить вопрос</button>
                <button class="btn-primary" id="backToLoginBtn" style="margin-top:12px;background:#CFDFE8;color:#0B1A2C;">← Назад</button>
            </div>
        `;
        
        document.getElementById("saveQuestionBtn").addEventListener("click", async () => {
            const theme = document.getElementById("adminTheme").value;
            const question = document.getElementById("adminQuestion").value.trim();
            const options = [
                document.getElementById("opt0").value.trim(),
                document.getElementById("opt1").value.trim(),
                document.getElementById("opt2").value.trim(),
                document.getElementById("opt3").value.trim()
            ];
            const correctIndex = parseInt(document.getElementById("correctIdx").value) || 0;
            
            if (!question || options.some(o => !o)) {
                alert("Заполните все поля!");
                return;
            }
            
            const feedback = ["", "", "", ""]; // Можно добавить поля для фидбека
            
            const saved = await addNewQuestion(theme, question, options, correctIndex, feedback);
            if (saved) {
                alert("✅ Вопрос успешно добавлен!");
                renderLogin();
            } else {
                alert("❌ Ошибка при сохранении вопроса");
            }
        });
        
        document.getElementById("backToLoginBtn").addEventListener("click", () => {
            renderLogin();
        });
    }

    function renderGame() {
        if (!currentGame || currentGame.completed) return;
        
        const qData = currentGame.questions[currentGame.currentIndex];
        if (!qData) return;
        
        const container = document.getElementById("mainContent");
        const total = currentGame.questions.length;
        const current = currentGame.currentIndex + 1;
        
        container.innerHTML = `
            <div class="question-header">
                <span>Вопрос ${current} из ${total}</span>
                <span>Тема: ${escapeHtml(qData.theme)}</span>
                <span>Очки: ${currentGame.totalScore.toFixed(1)}</span>
            </div>
            <div class="question-text">${escapeHtml(qData.questionObj.text)}</div>
            <div class="options-list" id="optionsList"></div>
            <div id="feedbackArea"></div>
            <button class="btn-primary next-btn" id="nextBtn" disabled>Далее →</button>
        `;
        
        const optionsList = document.getElementById("optionsList");
        qData.questionObj.options.forEach((opt, idx) => {
            const btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerHTML = `<span class="option-prefix">${String.fromCharCode(65 + idx)}</span>${escapeHtml(opt.text)}`;
            btn.addEventListener("click", () => onAnswer(btn, qData, opt.type, opt.feedback));
            optionsList.appendChild(btn);
        });
    }

    function onAnswer(btn, qData, answerType, feedbackText) {
        // Блокируем все кнопки
        const allBtns = document.querySelectorAll(".option-btn");
        allBtns.forEach(b => b.disabled = true);
        
        // Подсчёт очков
        let points = 0;
        let feedbackClass = "";
        let feedbackTitle = "";
        
        if (answerType === 3) {
            points = 1;
            feedbackClass = "#FFF7F0";
            feedbackTitle = "✅ Отлично!";
            btn.style.background = "#D4EDDA";
            btn.style.borderColor = "#28A745";
        } else if (answerType === 2) {
            points = 0.5;
            feedbackClass = "#FFF3CD";
            feedbackTitle = "⚠️ Частично верно";
            btn.style.background = "#FFF3CD";
            btn.style.borderColor = "#FFC107";
        } else {
            points = 0;
            feedbackClass = "#F8D7DA";
            feedbackTitle = "❌ Неверно";
            btn.style.background = "#F8D7DA";
            btn.style.borderColor = "#DC3545";
        }
        
        currentGame.totalScore += points;
        qData.answered = true;
        qData.points = points;
        
        // Показываем фидбек
        const feedbackArea = document.getElementById("feedbackArea");
        feedbackArea.innerHTML = `
            <div class="feedback-area" style="background:${feedbackClass};">
                <strong>${feedbackTitle}</strong>
                <p style="margin-top:8px;">${escapeHtml(feedbackText)}</p>
            </div>
        `;
        
        // Активируем кнопку "Далее"
        const nextBtn = document.getElementById("nextBtn");
        nextBtn.disabled = false;
        nextBtn.addEventListener("click", () => {
            currentGame.currentIndex++;
            if (currentGame.currentIndex >= currentGame.questions.length) {
                finishGame();
            } else {
                renderGame();
            }
        });
    }

    async function finishGame() {
        currentGame.completed = true;
        const score = currentGame.totalScore;
        
        if (currentUser) {
            await updateGlobalStats(currentUser.name, score);
        }
        
        renderResults(score);
    }

    function renderResults(score) {
        const container = document.getElementById("mainContent");
        const maxScore = currentGame.questions.length;
        const percentage = (score / maxScore * 100).toFixed(1);
        
        container.innerHTML = `
            <div class="score-summary">
                <p>Викторина завершена!</p>
                <div class="big-score">${score.toFixed(1)} / ${maxScore}</div>
                <p>Результат: ${percentage}%</p>
            </div>
            <div style="text-align:center;">
                <button class="btn-primary restart-btn" id="restartBtn">🔄 Сыграть ещё раз</button>
                <button class="btn-primary restart-btn" id="toRatingBtn" style="background:#F26B2E;">🏅 К рейтингу</button>
            </div>
        `;
        
        document.getElementById("restartBtn").addEventListener("click", () => {
            startNewGame(currentUser);
        });
        
        document.getElementById("toRatingBtn").addEventListener("click", () => {
            renderLogin();
        });
    }

    // ------------------------------------------------------------------
    // ЗАПУСК ПРИЛОЖЕНИЯ
    (async function() {
        await loadGlobalLeaderboard();
        await initQuestions();
        renderLogin();
        
        document.getElementById("logoutBtn")?.addEventListener("click", () => {
            currentUser = null;
            currentGame = null;
            renderLogin();
        });
    })();
</script>
</body>
</html>
